<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Pages</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root { --cream:#f5f0e8;--warm:#e8ddd0;--bark:#8b6f5e;--stone:#4a4240;--fog:#a09490;--sage:#7a9e8e;--gold:#c4975a;--ink:#2d2320; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  .page{display:none;min-height:100vh;animation:fadeIn 0.6s ease forwards;}
  .page.active{display:flex;flex-direction:column;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  header{padding:2.5rem 2rem 1rem;display:flex;justify-content:space-between;align-items:flex-start;}
  .date-day{font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:300;color:var(--bark);line-height:1;}
  .date-full{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--fog);margin-top:4px;}
  .header-right{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--fog);text-align:right;padding-top:.5rem;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,var(--bark) 30%,var(--bark) 70%,transparent);opacity:.2;margin:0 2rem;}
  .body-pad{flex:1;padding:2rem 2rem calc(80px + 2rem);display:flex;flex-direction:column;gap:1.6rem;}
  .section-label{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--fog);margin-bottom:.8rem;}
  .mood-block{display:flex;flex-direction:column;}
  .score-question{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;font-style:italic;color:var(--stone);line-height:1.4;margin-bottom:1.4rem;}
  .score-display{display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-bottom:1.2rem;}
  .mood-words{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.2rem;}
  .mood-word{padding:.55rem 1rem;border-radius:20px;border:1.5px solid var(--warm);background:white;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--stone);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
  .mood-word.selected{color:white;border-color:transparent;}
  .mood-word.tier-1.selected{background:#c47a5a;}
  .mood-word.tier-2.selected{background:#c4975a;}
  .mood-word.tier-3.selected{background:#8b6f5e;}
  .mood-word.tier-4.selected{background:#7a9e8e;}
  .mood-word.tier-5.selected{background:#5a8e7e;}
  .score-bucket{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--fog);transition:color .3s;min-height:1em;}
  .score-number{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:300;line-height:1;transition:color .3s;color:var(--bark);}
  .score-display{display:flex;flex-direction:column;align-items:center;gap:.4rem;padding:.8rem;background:white;border-radius:16px;border:1.5px solid var(--warm);}
  .prompt-card{background:white;border-radius:16px;padding:1.6rem;border:1.5px solid var(--warm);animation:slideUp .5s ease forwards;opacity:0;}
  .prompt-card:nth-child(1){animation-delay:.05s;}
  .prompt-card:nth-child(2){animation-delay:.15s;}
  .prompt-card:nth-child(3){animation-delay:.25s;}
  @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .prompt-tag{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--sage);margin-bottom:.6rem;}
  .prompt-text{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:300;font-style:italic;color:var(--stone);line-height:1.55;}
  .prompt-note{font-size:.7rem;color:var(--fog);margin-top:.8rem;font-style:italic;}
  .btn-primary{width:100%;padding:1rem;background:var(--bark);color:white;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
  .btn-primary:hover{background:var(--stone);transform:translateY(-1px);}
  .btn-ghost{width:100%;padding:.85rem;background:transparent;color:var(--fog);border:1.5px solid var(--warm);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
  .btn-ghost:hover{border-color:var(--bark);color:var(--bark);}
  .complete-body{flex:1;padding:2rem 2rem calc(80px + 1rem);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;text-align:center;}
  .complete-mark{width:60px;height:60px;border-radius:50%;background:var(--sage);display:flex;align-items:center;justify-content:center;font-size:1.5rem;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;}
  @keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .complete-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--stone);}
  .complete-sub{font-size:.82rem;color:var(--fog);line-height:1.7;max-width:270px;}
  .summary-card{background:white;border-radius:16px;padding:1.2rem 1.5rem;border:1.5px solid var(--warm);width:100%;text-align:left;}
  .summary-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.4rem;}
  .summary-label{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--fog);}
  .summary-score-big{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;line-height:1;}
  .summary-word{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--stone);}
  .summary-prompts{margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--warm);display:flex;flex-direction:column;gap:.5rem;}
  .summary-prompt-line{font-size:.75rem;color:var(--fog);font-style:italic;line-height:1.4;}
  .streak-bar{display:flex;gap:6px;margin-top:.2rem;}
  .streak-dot{width:9px;height:9px;border-radius:50%;background:var(--warm);}
  .streak-dot.filled{background:var(--gold);}
  .history-body{flex:1;padding:1.5rem 2rem calc(80px + 1rem);display:flex;flex-direction:column;gap:1rem;overflow-y:auto;}
  .history-entry{background:white;border-radius:14px;padding:1.2rem 1.4rem;border:1.5px solid var(--warm);}
  .history-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;}
  .history-date{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--fog);}
  .history-score-chip{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;padding:2px 10px;border-radius:20px;background:var(--cream);}
  .history-prompts{display:flex;flex-direction:column;gap:.3rem;}
  .history-prompt{font-size:.78rem;color:var(--stone);font-style:italic;line-height:1.4;}
  .empty-history{text-align:center;padding:3rem 1rem;color:var(--fog);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;line-height:1.6;}
  .trend-wrap{background:white;border-radius:14px;padding:1.2rem;border:1.5px solid var(--warm);}
  .trend-title{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--fog);margin-bottom:1rem;}
  .chart-area{position:relative;height:80px;width:100%;}
  .chart-svg{width:100%;height:100%;}
  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(245,240,232,.94);backdrop-filter:blur(12px);border-top:1px solid var(--warm);display:flex;padding:.6rem 0 calc(.6rem + env(safe-area-inset-bottom));z-index:50;}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:.4rem 0;-webkit-tap-highlight-color:transparent;}
  .nav-icon{font-size:1.2rem;}
  .nav-label{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--fog);transition:color .2s;}
  .nav-btn.active .nav-label{color:var(--bark);}
</style>
</head>
<body>

<div id="page-today" class="page active">
  <header>
    <div><div class="date-day" id="today-day"></div><div class="date-full" id="today-full"></div></div>
    <div class="header-right" id="streak-label"></div>
  </header>
  <div class="divider"></div>
  <div class="body-pad">
    <div class="mood-block">
      <div class="section-label">Morning Mood</div>
      <div class="score-question">Which words feel true right now?</div>
      <div class="mood-words" id="mood-words"></div>
      <div class="score-display" id="score-display" style="display:none">
        <div class="score-number" id="score-num">5</div>
        <div class="score-bucket" id="score-bucket">Finding Ground</div>
      </div>
    </div>
    <div>
      <div class="section-label">Three prompts today — write in your journal</div>
      <div style="display:flex;flex-direction:column;gap:1rem" id="prompts-container"></div>
    </div>
    <button class="btn-primary" onclick="saveEntry()">Log This Morning</button>
  </div>
</div>

<div id="page-complete" class="page">
  <header>
    <div><div class="date-day" id="complete-day"></div><div class="date-full" id="complete-full"></div></div>
  </header>
  <div class="divider"></div>
  <div class="complete-body">
    <div class="complete-mark">✦</div>
    <div class="complete-title">You showed up.</div>
    <div class="complete-sub">Pen to paper, honest with yourself. That is the whole practice.</div>
    <div class="streak-bar" id="streak-dots"></div>
    <div class="summary-card" id="summary-card"></div>
    <button class="btn-ghost" onclick="exportData()">⬇️ Export My Journal History</button>
  </div>
</div>

<div id="page-history" class="page">
  <header>
    <div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;color:var(--bark)">Past Mornings</div>
      <div class="date-full" id="history-count"></div>
    </div>
  </header>
  <div class="divider"></div>
  <div class="history-body">
    <div class="trend-wrap" id="trend-wrap" style="display:none">
      <div class="trend-title">Mood trend</div>
      <div class="chart-area"><svg class="chart-svg" id="trend-svg"></svg></div>
    </div>
    <div id="history-container"></div>
    <button class="btn-ghost" onclick="exportData()" style="margin-top:.5rem">⬇️ Export My Journal History</button>
  </div>
</div>

<nav>
  <button class="nav-btn active" id="nav-today" onclick="navTo('today')">
    <span class="nav-icon">☀️</span><span class="nav-label">Today</span>
  </button>
  <button class="nav-btn" id="nav-history" onclick="navTo('history')">
    <span class="nav-icon">📈</span><span class="nav-label">History</span>
  </button>
</nav>

<script>
const MOOD_WORDS=[
  {word:"Struggling",   score:1,  tier:1},
  {word:"Heavy",        score:2,  tier:1},
  {word:"Numb",         score:2,  tier:1},
  {word:"Sad",          score:2,  tier:1},
  {word:"Defeated",     score:1,  tier:1},
  {word:"Foggy",        score:3,  tier:2},
  {word:"Anxious",      score:3,  tier:2},
  {word:"Scattered",    score:3,  tier:2},
  {word:"Uneasy",       score:4,  tier:2},
  {word:"Tired",        score:4,  tier:2},
  {word:"Searching",    score:5,  tier:2},
  {word:"Okay",         score:5,  tier:2},
  {word:"Neutral",      score:5,  tier:3},
  {word:"Unsettled",    score:4,  tier:2},
  {word:"Calm",         score:7,  tier:4},
  {word:"Steady",       score:6,  tier:3},
  {word:"Present",      score:7,  tier:4},
  {word:"Grounded",     score:7,  tier:4},
  {word:"Clearheaded",  score:8,  tier:4},
  {word:"Focused",      score:8,  tier:4},
  {word:"Sharp",        score:8,  tier:4},
  {word:"Hopeful",      score:8,  tier:4},
  {word:"Grateful",     score:9,  tier:5},
  {word:"Energized",    score:9,  tier:5},
  {word:"Connected",    score:9,  tier:5},
  {word:"Joyful",       score:10, tier:5},
  {word:"Alive",        score:10, tier:5},
  {word:"Thriving",     score:10, tier:5},
];

const BUCKETS=[
  {min:1,  max:3,  label:"In the Depths",    color:"#c47a5a"},
  {min:4,  max:5,  label:"Finding Ground",   color:"#c4975a"},
  {min:6,  max:7,  label:"Holding Steady",   color:"#8b6f5e"},
  {min:8,  max:9,  label:"Rising",           color:"#7a9e8e"},
  {min:10, max:10, label:"Thriving",         color:"#5a8e7e"},
];

let selectedWords=new Set();

function getBucket(score){return BUCKETS.find(b=>score>=b.min&&score<=b.max)||BUCKETS[0];}

function renderMoodWords(){
  document.getElementById('mood-words').innerHTML=MOOD_WORDS.map(m=>
    `<button class="mood-word tier-${m.tier}" data-word="${m.word}" onclick="toggleWord('${m.word}')">${m.word}</button>`
  ).join('');
}

function toggleWord(word){
  const btn=document.querySelector(`[data-word="${word}"]`);
  if(selectedWords.has(word)){selectedWords.delete(word);btn.classList.remove('selected');}
  else{selectedWords.add(word);btn.classList.add('selected');}
  updateMoodScore();
}

function updateMoodScore(){
  const disp=document.getElementById('score-display');
  if(selectedWords.size===0){disp.style.display='none';return;}
  const words=MOOD_WORDS.filter(m=>selectedWords.has(m.word));
  const avg=Math.round(words.reduce((s,m)=>s+m.score,0)/words.length);
  const bucket=getBucket(avg);
  document.getElementById('score-num').textContent=avg;
  document.getElementById('score-num').style.color=bucket.color;
  document.getElementById('score-bucket').textContent=bucket.label;
  document.getElementById('score-bucket').style.color=bucket.color;
  disp.style.display='flex';
}

t":"When did I last feel pure, uncomplicated joy?","mode":"Wonder","cls":"grounding"},{"text":"What is something I find mysterious in the best way?","mode":"Wonder","cls":"grounding"},{"text":"What would I notice today if I moved through it like a curious visitor?","mode":"Wonder","cls":"grounding"},{"text":"What is sacred to me, however I define that word?","mode":"Wonder","cls":"grounding"},{"text":"What in my life right now is quietly, secretly magical?","mode":"Wonder","cls":"grounding"},{"text":"What does stillness offer me when I stop resisting it?","mode":"Wonder","cls":"grounding"},{"text":"What would slowing down let me finally see?","mode":"Wonder","cls":"grounding"},{"text":"What is worth pausing for today that I would normally rush past?","mode":"Wonder","cls":"grounding"},{"text":"What fills me with hope when I let it?","mode":"Wonder","cls":"grounding"}];

function getActiveSabbat(){
  const now=new Date();
  const y=now.getFullYear();
  for(const sb of SABBATS){
    for(const yr of [y-1,y,y+1]){
      const center=new Date(yr,sb.m-1,sb.d);
      const diff=Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate())-center)/86400000);
      if(diff>=-1&&diff<=1){
        const dayMs=86400000;
        const dayNum=Math.floor(new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime()/dayMs);
        const idx=((dayNum%sb.prompts.length)+sb.prompts.length)%sb.prompts.length;
        return {name:sb.name,text:sb.prompts[idx]};
      }
    }
  }
  return null;
}
function seededOrder(len,seed){
  // Build a shuffled index order deterministically from a seed using a simple LCG
  const arr=Array.from({length:len},(_,i)=>i);
  let s=seed;
  for(let i=len-1;i>0;i--){
    s=(s*1103515245+12345)&0x7fffffff;
    const j=s%(i+1);
    const t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
  return arr;
}
function pickClass(pool,day,salt){
  const len=pool.length;
  const cycle=Math.floor(day/len);
  const pos=((day%len)+len)%len;
  const order=seededOrder(len,cycle*97+salt);
  // Reorder so that consecutive positions favor different modes
  const shuffled=order.map(i=>pool[i]);
  const byMode={};
  shuffled.forEach(p=>{(byMode[p.mode]=byMode[p.mode]||[]).push(p);});
  const modes=Object.keys(byMode);
  const interleaved=[];
  let added=true, r=0;
  while(interleaved.length<shuffled.length){
    added=false;
    for(const mk of modes){ if(byMode[mk][r]){interleaved.push(byMode[mk][r]);added=true;} }
    r++;
    if(!added)break;
  }
  return interleaved[pos];
}
function getTodayPrompts(){
  const dayMs=86400000;
  const now=new Date();
  const local=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const day=Math.floor(local.getTime()/dayMs);
  const g=pickClass(POOL_GROUNDING,day,13);
  const o=pickClass(POOL_OUTWARD,day,53);
  const d=pickClass(POOL_DEEP,day,97);
  return [
    {tag:g.mode,text:g.text},
    {tag:o.mode,text:o.text},
    {tag:d.mode,text:d.text}
  ];
}

  const sabbat=getActiveSabbat();
  if(sabbat){
    html+=`<div class="prompt-card" style="border-color:#9a7bb0;background:linear-gradient(180deg,#faf6fc,white)"><div class="prompt-tag" style="color:#9a7bb0">✦ ${sabbat.name} · Wheel of the Year</div><div class="prompt-text">${sabbat.text}</div><div class="prompt-note">✏️ A seasonal reflection for this turning of the wheel</div></div>`;
  }
  html+=getTodayPrompts().map(p=>`<div class="prompt-card"><div class="prompt-tag">${labels[p.tag]||p.tag}</div><div class="prompt-text">${p.text}</div><div class="prompt-note">✏️ Write your response in your journal</div></div>`).join('');
  document.getElementById('prompts-container').innerHTML=html;
}

function saveEntry(){
  const words=MOOD_WORDS.filter(m=>selectedWords.has(m.word));
  const score=selectedWords.size>0?Math.round(words.reduce((s,m)=>s+m.score,0)/words.length):5;
  const bucket=getBucket(score);
  const sb=getActiveSabbat();
  const promptList=getTodayPrompts().map(p=>p.tag+': '+p.text);
  if(sb)promptList.unshift(sb.name+' (Wheel of the Year): '+sb.text);
  const entry={date:todayKey(),score,bucket:bucket.label,words:[...selectedWords],prompts:promptList};
  const idx=entries.findIndex(e=>e.date===todayKey());
  if(idx>=0)entries[idx]=entry;else entries.push(entry);
  localStorage.setItem('mp_entries',JSON.stringify(entries));
  showComplete(entry);
}

function showComplete(entry){
  const d=formatDate(entry.date);
  document.getElementById('complete-day').textContent=d.day;
  document.getElementById('complete-full').textContent=d.full;
  const streak=getStreak();
  const bucket=getBucket(entry.score);
  document.getElementById('streak-dots').innerHTML=Array.from({length:7},(_,i)=>`<div class="streak-dot ${i<Math.min(streak,7)?'filled':''}"></div>`).join('');
  document.getElementById('summary-card').innerHTML=`
    <div class="summary-row">
      <div class="summary-label">Mood score</div>
      <div class="summary-score-big" style="color:${bucket.color}">${entry.score}</div>
    </div>
    <div class="summary-word" style="color:${bucket.color}">${entry.bucket||bucket.label}</div>
    <div style="margin-top:.5rem;font-size:.75rem;color:var(--fog);font-style:italic">${(entry.words||[]).join(' · ')}</div>
    <div class="summary-prompts">${entry.prompts.map(p=>`<div class="summary-prompt-line">${p}</div>`).join('')}</div>`;
  showPage('page-complete');
}

function renderHistory(){
  const sorted=[...entries].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('history-count').textContent=`${sorted.length} ${sorted.length===1?'morning':'mornings'} logged`;
  const tw=document.getElementById('trend-wrap');
  if(sorted.length>=2){tw.style.display='block';renderTrend(sorted.slice(0,14).reverse());}else tw.style.display='none';
  if(sorted.length===0){document.getElementById('history-container').innerHTML='<div class="empty-history">Your mornings will appear here after your first log.</div>';return;}
  document.getElementById('history-container').innerHTML=sorted.map(e=>{
    const d=formatDate(e.date);
    const bucket=getBucket(e.score);
    return`<div class="history-entry">
      <div class="history-row">
        <div class="history-date">${d.full}</div>
        <div class="history-score-chip" style="color:${bucket.color}">${e.score} · ${e.bucket||bucket.label}</div>
      </div>
      ${e.words&&e.words.length?`<div style="font-size:.72rem;color:var(--fog);font-style:italic;margin-bottom:.5rem">${e.words.join(' · ')}</div>`:''}
      <div class="history-prompts">${e.prompts.map(p=>`<div class="history-prompt">${p}</div>`).join('')}</div>
    </div>`;
  }).join('');
}

function renderTrend(data){
  const svg=document.getElementById('trend-svg');const w=svg.parentElement.clientWidth||300;const h=80,pad=16;
  const pts=data.map((e,i)=>({x:pad+i*(w-pad*2)/(data.length-1),y:h-pad-(e.score-1)/9*(h-pad*2),score:e.score}));
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'} ${p.x} ${p.y}`).join(' ');
  svg.innerHTML=`<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--bark)" stop-opacity="0.15"/><stop offset="100%" stop-color="var(--bark)" stop-opacity="0"/></linearGradient></defs><path d="${pathD} L ${pts[pts.length-1].x} ${h} L ${pts[0].x} ${h} Z" fill="url(#tg)"/><path d="${pathD}" fill="none" stroke="var(--bark)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="white" stroke="${getBucket(p.score).color}" stroke-width="2"/>`).join('')}`;
}

function exportData(){
  if(entries.length===0){alert('No entries to export yet.');return;}
  const lines=['Morning Pages Journal Export','Generated: '+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}),'',''];
  const sorted=[...entries].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach(e=>{
    const d=formatDate(e.date);const bucket=getBucket(e.score);
    lines.push('=== '+d.full+' ===');
    lines.push('Mood Score: '+e.score+' / 10  ('+( e.bucket||bucket.label)+')');
    if(e.words&&e.words.length)lines.push('Words: '+e.words.join(', '));
    lines.push('');e.prompts.forEach(p=>lines.push('  '+p));lines.push('');
  });
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='morning-journal-'+new Date().toISOString().slice(0,10)+'.txt';a.click();URL.revokeObjectURL(url);
}

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}

function navTo(tab){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(tab==='today'){document.getElementById('nav-today').classList.add('active');const te=entries.find(e=>e.date===todayKey());if(te)showComplete(te);else showPage('page-today');}
  else{document.getElementById('nav-history').classList.add('active');renderHistory();showPage('page-history');}
}

function init(){
  const d=formatDate(todayKey());
  document.getElementById('today-day').textContent=d.day;
  document.getElementById('today-full').textContent=d.full;
  const streak=getStreak();
  document.getElementById('streak-label').textContent=streak>1?`${streak} day streak`:'';
  renderMoodWords();
  renderTodayPrompts();
  const te=entries.find(e=>e.date===todayKey());
  if(te)showComplete(te);
}

init();
</script>
</body>
</html>
